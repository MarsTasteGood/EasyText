<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickWrite — AI Writing Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c11;
      --bg2:      #101016;
      --surface:  #14141b;
      --surface2: #1a1a23;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.13);
      --purple:   #7c3aed;
      --purple2:  #a78bfa;
      --pink:     #db2777;
      --gradient: linear-gradient(135deg,#7c3aed,#db2777);
      --glow:     rgba(124,58,237,0.35);
      --text:     #f1f1f6;
      --text2:    #9898b4;
      --muted:    #6565808;
      --green:    #22d3a3;
      --red:      #f87171;
      --yellow:   #fbbf24;
      --radius:   16px;
      --radius-sm:11px;
      --radius-xs: 7px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background:
        radial-gradient(ellipse 55% 55% at 12% 25%, rgba(124,58,237,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 45% 45% at 88% 75%, rgba(219,39,119,0.06) 0%, transparent 70%),
        var(--bg);
      color: var(--text);
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(12,12,17,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0; z-index: 100;
    }

    .logo {
      display: flex; align-items: center; gap: 11px;
      font-size: 1.1rem; font-weight: 700; letter-spacing: -0.03em;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: var(--gradient);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 2px 14px rgba(124,58,237,0.5);
    }

    .api-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 15px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 100px; color: var(--text2);
      font-size: 0.81rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }

    .api-btn:hover { border-color: var(--border2); color: var(--text); }
    .api-btn.has-key { color: var(--green); border-color: rgba(34,211,163,0.3); background: rgba(34,211,163,0.06); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── Layout ── */
    main { flex: 1; overflow-y: auto; }

    .grid {
      display: grid; grid-template-columns: 1fr 1fr;
      max-width: 1200px; width: 100%;
      margin: 0 auto; padding: 28px 28px; gap: 20px;
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; padding: 16px; }
      header { padding: 12px 18px; }
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2);
    }

    .panel-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Type toggle ── */
    .mode-toggle {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 4px; gap: 3px;
    }

    .mode-btn {
      padding: 8px 6px; border: none; border-radius: 8px;
      background: transparent; color: var(--text2);
      font-size: 0.84rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }

    .mode-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.04); }
    .mode-btn.active { background: var(--gradient); color: #fff; box-shadow: 0 2px 14px var(--glow); font-weight: 600; }

    /* ── Language ── */
    .lang-select-wrap { position: relative; }
    .lang-select-wrap::after {
      content: '▾'; position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%); color: var(--text2);
      pointer-events: none; font-size: 0.8rem;
    }

    select {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 0.88rem; font-family: inherit;
      padding: 10px 34px 10px 14px; width: 100%;
      cursor: pointer; -webkit-appearance: none; appearance: none;
      transition: all 0.2s;
    }

    select:focus { outline: none; border-color: rgba(124,58,237,0.5); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    select option { background: #14141b; }

    /* ── Tone pills ── */
    .pill-group { display: flex; flex-wrap: wrap; gap: 7px; }

    .pill {
      padding: 6px 14px;
      border: 1px solid var(--border); border-radius: 100px;
      background: transparent; color: var(--text2);
      font-size: 0.81rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s;
    }

    .pill:hover { border-color: var(--border2); color: var(--text); }
    .pill.active { background: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.5); color: var(--purple2); font-weight: 600; }

    /* ── Vibe grid (12 vibes, 4 cols) ── */
    .vibe-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

    .vibe-pill {
      padding: 12px 6px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text2);
      font-size: 0.77rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s;
      text-align: center; display: flex; flex-direction: column;
      align-items: center; gap: 5px;
    }

    .vibe-emoji { font-size: 1.45rem; line-height: 1; }
    .vibe-name { font-size: 0.73rem; color: var(--text2); font-weight: 500; letter-spacing: 0.01em; }

    .vibe-pill:hover {
      border-color: rgba(124,58,237,0.35);
      background: rgba(124,58,237,0.08);
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    .vibe-pill.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.22), rgba(219,39,119,0.12));
      border-color: rgba(124,58,237,0.55);
      box-shadow: 0 0 14px rgba(124,58,237,0.2);
    }

    .vibe-pill.active .vibe-name { color: var(--purple2); }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 0.72rem; font-weight: 700;
      color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase;
    }

    .label-opt { color: var(--text2); opacity: 0.6; font-size: 0.72rem; text-transform: none; letter-spacing: 0; font-weight: 400; }

    textarea, input[type="text"], input[type="password"] {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 0.88rem; font-family: inherit;
      padding: 10px 14px; width: 100%;
      transition: all 0.2s; resize: none; line-height: 1.6;
    }

    textarea:focus, input:focus {
      outline: none; border-color: rgba(124,58,237,0.5);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
      background: rgba(124,58,237,0.03);
    }

    textarea::placeholder, input::placeholder { color: var(--text2); opacity: 0.5; }

    /* ── Generate button ── */
    .generate-btn {
      width: 100%; padding: 13px;
      background: var(--gradient);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-size: 0.93rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 18px rgba(124,58,237,0.35);
      letter-spacing: -0.01em;
    }

    .generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,58,237,0.45);
    }

    .generate-btn:active:not(:disabled) { transform: translateY(0); }
    .generate-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    /* ── Output panel ── */
    .output-panel { display: flex; flex-direction: column; }

    .output-body {
      flex: 1; padding: 18px;
      display: flex; flex-direction: column; gap: 12px;
      min-height: 390px;
    }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; color: var(--text2); text-align: center;
      padding: 40px 20px;
    }

    .empty-icon { font-size: 2.8rem; opacity: 0.2; }

    .empty-state p { font-size: 0.86rem; max-width: 220px; line-height: 1.6; color: var(--text2); opacity: 0.7; }

    /* ── Subject box ── */
    .subject-box {
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: var(--radius-sm); padding: 12px 16px;
    }

    .subject-label {
      font-size: 0.68rem; font-weight: 700; color: var(--purple2);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px;
    }

    .subject-text { font-size: 0.93rem; font-weight: 600; color: var(--text); }

    .output-text {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px 18px;
      font-size: 0.88rem; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; flex: 1; min-height: 240px; font-family: inherit;
    }

    /* ── Text option cards ── */
    .text-options { display: flex; flex-direction: column; gap: 10px; flex: 1; }

    .text-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px;
      display: flex; flex-direction: column; gap: 12px;
      transition: all 0.2s; cursor: default;
    }

    .text-card:hover {
      border-color: rgba(124,58,237,0.28);
      box-shadow: 0 6px 22px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    .text-card-label {
      font-size: 0.68rem; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.07em; opacity: 0.6;
    }

    .text-card-body {
      font-size: 0.91rem; line-height: 1.65; color: var(--text); white-space: pre-wrap;
    }

    .text-card-footer { display: flex; justify-content: flex-end; }

    .copy-card-btn {
      padding: 5px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 100px; color: var(--text2);
      font-size: 0.77rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s;
    }

    .copy-card-btn:hover { border-color: rgba(124,58,237,0.4); color: var(--purple2); background: rgba(124,58,237,0.08); }
    .copy-card-btn.copied { border-color: var(--green); color: var(--green); background: rgba(34,211,163,0.07); }

    .texts-streaming {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px 18px;
      font-size: 0.88rem; line-height: 1.75; color: var(--text); white-space: pre-wrap;
      min-height: 120px;
    }

    /* ── Refine bar ── */
    .refine-bar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
      padding: 11px 18px; border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }

    .refine-label {
      font-size: 0.68rem; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.07em; margin-right: 3px;
    }

    .refine-btn {
      padding: 5px 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 100px;
      color: var(--text2); font-size: 0.77rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s;
    }

    .refine-btn:hover:not(:disabled) { border-color: rgba(124,58,237,0.4); color: var(--purple2); background: rgba(124,58,237,0.08); }
    .refine-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Stats bar ── */
    .stats {
      display: flex; flex-wrap: wrap; gap: 16px;
      padding: 9px 20px; border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--text2);
      background: rgba(255,255,255,0.01);
    }

    .stat { display: flex; align-items: center; gap: 5px; }
    .stat-val { color: var(--purple2); font-weight: 600; }

    /* ── Action bar ── */
    .action-bar {
      display: flex; gap: 8px;
      padding: 12px 18px; border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }

    .action-btn {
      flex: 1; padding: 8px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text2);
      font-size: 0.81rem; font-weight: 500; cursor: pointer; transition: all 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }

    .action-btn:hover:not(:disabled) { border-color: var(--border2); color: var(--text); background: var(--surface); }
    .action-btn.copied { border-color: var(--green); color: var(--green); background: rgba(34,211,163,0.07); }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Spinner / cursor ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 0.65s linear infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor::after { content:'▋'; animation: blink 1s infinite; color: var(--purple2); font-size:0.85em; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 28px;
      width: 420px; max-width: calc(100vw - 40px);
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .modal h2 { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
    .modal p { font-size: 0.83rem; color: var(--text2); line-height: 1.55; }
    .modal-btns { display: flex; gap: 10px; margin-top: 4px; }

    .btn-primary {
      flex: 1; padding: 10px;
      background: var(--gradient);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
      box-shadow: 0 4px 14px var(--glow);
    }

    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost {
      flex: 1; padding: 10px; background: transparent;
      border: 1px solid var(--border2); border-radius: var(--radius-sm);
      color: var(--text2); font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s;
    }

    .btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

    /* ── Key status ── */
    .key-valid   { color: var(--green); font-size: 0.8rem; }
    .key-invalid { color: var(--yellow); font-size: 0.8rem; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✍️</div>
    QuickWrite
  </div>
  <button class="api-btn" id="apiBtn" onclick="openModal()">
    <div class="dot"></div>
    <span id="apiLabel">Add API Key</span>
  </button>
</header>

<main>
  <div class="grid">

    <!-- ── Left: Compose ── -->
    <div class="panel">
      <div class="panel-header"><span id="composeHeader">Compose</span></div>
      <div class="panel-body">

        <div class="field">
          <label id="typeLabel">Type</label>
          <div class="mode-toggle">
            <button class="mode-btn active" id="modeEmail"   onclick="setMode('email')">📧 Email</button>
            <button class="mode-btn"        id="modeMessage" onclick="setMode('message')">💬 Message</button>
            <button class="mode-btn"        id="modeText"    onclick="setMode('text')">📱 Text</button>
          </div>
        </div>

        <div class="field">
          <label id="langLabel">Language</label>
          <div class="lang-select-wrap">
            <select id="langSelect" onchange="setLang(this.value)">
              <option value="en">🇺🇸 English</option>
              <option value="ja">🇯🇵 日本語</option>
              <option value="es">🇪🇸 Español</option>
              <option value="fr">🇫🇷 Français</option>
              <option value="zh">🇨🇳 中文</option>
            </select>
          </div>
        </div>

        <!-- Tone (email/message) -->
        <div class="field" id="toneField">
          <label id="toneLabel">Tone</label>
          <div class="pill-group">
            <button class="pill active" data-tone="professional" onclick="setTone(this)">Professional</button>
            <button class="pill" data-tone="friendly"   onclick="setTone(this)">Friendly</button>
            <button class="pill" data-tone="casual"     onclick="setTone(this)">Casual</button>
            <button class="pill" data-tone="formal"     onclick="setTone(this)">Formal</button>
            <button class="pill" data-tone="persuasive" onclick="setTone(this)">Persuasive</button>
            <button class="pill" data-tone="concise"    onclick="setTone(this)">Concise</button>
          </div>
        </div>

        <!-- Vibe (text) — 12 options, 4 cols -->
        <div class="field" id="vibeField" style="display:none">
          <label id="vibeLabel">Vibe</label>
          <div class="vibe-group">
            <button class="vibe-pill active" data-vibe="funny"     onclick="setVibe(this)"><span class="vibe-emoji">😂</span><span class="vibe-name">Funny</span></button>
            <button class="vibe-pill"        data-vibe="sweet"     onclick="setVibe(this)"><span class="vibe-emoji">🥺</span><span class="vibe-name">Sweet</span></button>
            <button class="vibe-pill"        data-vibe="hype"      onclick="setVibe(this)"><span class="vibe-emoji">🔥</span><span class="vibe-name">Hype</span></button>
            <button class="vibe-pill"        data-vibe="chill"     onclick="setVibe(this)"><span class="vibe-emoji">🤙</span><span class="vibe-name">Chill</span></button>
            <button class="vibe-pill"        data-vibe="flirty"    onclick="setVibe(this)"><span class="vibe-emoji">😏</span><span class="vibe-name">Flirty</span></button>
            <button class="vibe-pill"        data-vibe="sorry"     onclick="setVibe(this)"><span class="vibe-emoji">🙏</span><span class="vibe-name">Sorry</span></button>
            <button class="vibe-pill"        data-vibe="dead"      onclick="setVibe(this)"><span class="vibe-emoji">💀</span><span class="vibe-name">Dead</span></button>
            <button class="vibe-pill"        data-vibe="savage"    onclick="setVibe(this)"><span class="vibe-emoji">😤</span><span class="vibe-name">Savage</span></button>
            <button class="vibe-pill"        data-vibe="support"   onclick="setVibe(this)"><span class="vibe-emoji">🫂</span><span class="vibe-name">Support</span></button>
            <button class="vibe-pill"        data-vibe="celebrate" onclick="setVibe(this)"><span class="vibe-emoji">🎉</span><span class="vibe-name">Celebrate</span></button>
            <button class="vibe-pill"        data-vibe="sarcastic" onclick="setVibe(this)"><span class="vibe-emoji">🙄</span><span class="vibe-name">Sarcastic</span></button>
            <button class="vibe-pill"        data-vibe="dramatic"  onclick="setVibe(this)"><span class="vibe-emoji">😭</span><span class="vibe-name">Dramatic</span></button>
          </div>
        </div>

        <!-- Context (always visible, label changes) -->
        <div class="field">
          <label id="contextLabel">What's this about?</label>
          <textarea id="context" rows="3"></textarea>
        </div>

        <!-- Email/Message fields -->
        <div id="writeFields">
          <div class="field" style="margin-bottom:16px">
            <label id="keypointsLabel">Key points <span class="label-opt" id="keypointsOpt">(optional)</span></label>
            <textarea id="keypoints" rows="3"></textarea>
          </div>
          <div class="field" id="recipientField" style="margin-bottom:16px">
            <label id="recipientLabel">To / Recipient <span class="label-opt" id="recipientOpt">(optional)</span></label>
            <input type="text" id="recipient">
          </div>
          <div class="field">
            <label id="draftLabel">Improve my draft <span class="label-opt" id="draftOpt">(optional)</span></label>
            <textarea id="draft" rows="3"></textarea>
          </div>
        </div>

        <!-- Text fields -->
        <div id="textFields" style="display:none">
          <div class="field" style="margin-bottom:16px">
            <label id="theyMsgLabel">They said <span class="label-opt" id="theyMsgOpt">(optional)</span></label>
            <textarea id="theyMsg" rows="3"></textarea>
          </div>
          <div class="field">
            <label id="youWantLabel">What you want to say <span class="label-opt" id="youWantOpt">(optional)</span></label>
            <textarea id="youWant" rows="2"></textarea>
          </div>
        </div>

        <button class="generate-btn" id="generateBtn" onclick="handleGenerate()">
          <span id="btnContent">✨ Generate</span>
        </button>

/* ── Fetch + stream ── */
async function fetchStream(messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1024, stream:true, messages }),
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `API error ${res.status}`); }
  return res;
}

async function streamInto(res, onChunk) {
  const reader = res.body.getReader(), dec = new TextDecoder();
  let full = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (const line of dec.decode(value,{stream:true}).split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') break;
      try { const p = JSON.parse(data); if (p.type==='content_block_delta'&&p.delta?.type==='text_delta') { full+=p.delta.text; onChunk(full,false); } } catch {}
    }
  }
  onChunk(full, true);
}

/* ══ EMAIL / MESSAGE ══ */
function buildWritePrompt(ri = null) {
  const ctx=document.getElementById('context').value.trim(), kp=document.getElementById('keypoints').value.trim(),
        rec=document.getElementById('recipient').value.trim(), drft=document.getElementById('draft').value.trim();
  if (!ctx && !drft) return null;
  const L = t('langPrompt');
  if (ri && currentOutput) {
    let p = `Rewrite the following ${mode} to be ${ri}. Keep the same core message. ${L} Return ONLY the rewritten ${mode}.\n\n`;
    if (mode==='email'&&currentSubject) p += `Subject: ${currentSubject}\n\n`;
    return p + currentOutput;
  }
  let p = `You are an expert writer. Write a ${tone} ${mode==='email'?'email':'message'}. ${L}\n\n`;
  if (ctx)  p += `Context: ${ctx}\n`;
  if (rec)  p += `To: ${rec}\n`;
  if (kp)   p += `\nKey points:\n${kp}\n`;
  if (drft) p += `\nImprove this draft:\n${drft}\n`;
  if (mode==='email') p += `\nFormat: subject first with literal prefix "Subject: " (always this exact English prefix), blank line, then body.`;
  else p += `\nJust write the message. No labels.`;
  return p + `\n\nBe natural, ${tone}, human-sounding.`;
}

async function generate(ri = null) {
  if (!apiKey) { openModal(); return; }
  const prompt = buildWritePrompt(ri);
  if (!prompt) { alert(t('alertEmpty')); return; }
  setLoading(true);
  document.getElementById('outputBody').innerHTML = `<div id="streamOutput" class="output-text cursor"></div>`;
  document.getElementById('refineBar').style.display = 'flex';
  document.getElementById('actionBar').style.display = 'flex';
  document.getElementById('statsBar').style.display  = 'flex';
  setRefineEnabled(false); setWriteActionEnabled(false);
  try {
    const res = await fetchStream([{role:'user',content:prompt}]);
    await streamInto(res,(text,done)=>{ renderWriteOutput(text,!done); if(done) finalizeWriteOutput(text); });
  } catch(e) { showError(e.message); } finally { setLoading(false); }
}

function renderWriteOutput(text, isSt) {
  const el = document.getElementById('streamOutput'); if (!el) return;
  if (mode==='email') {
    const m = text.match(/^Subject:\s*(.+)/m);
    if (m) {
      const subj=m[1].trim(), body=text.replace(/^Subject:\s*.+\n?\n?/m,'').trim();
      el.innerHTML=''; el.classList.remove('output-text');
      const sb=document.createElement('div'); sb.className='subject-box';
      sb.innerHTML=`<div class="subject-label">${escHtml(t('subjectLabel'))}</div><div class="subject-text">${escHtml(subj)}</div>`;
      el.appendChild(sb);
      const be=document.createElement('div'); be.className='output-text'+(isSt?' cursor':'');
      be.textContent=body; el.appendChild(be);
    } else { el.textContent=text; if(!isSt)el.classList.remove('cursor'); }
  } else { el.textContent=text; if(!isSt)el.classList.remove('cursor'); }
}

function finalizeWriteOutput(text) {
  currentOutput=''; currentSubject='';
  if (mode==='email') { const m=text.match(/^Subject:\s*(.+)/m); if(m){currentSubject=m[1].trim();currentOutput=text.replace(/^Subject:\s*.+\n?\n?/m,'').trim();}else currentOutput=text; }
  else currentOutput=text;
  renderWriteOutput(text,false); updateStats(currentOutput);
  setRefineEnabled(true); setWriteActionEnabled(true);
  const cb=document.getElementById('copySubjectBtn');
  if(mode==='email'&&currentSubject){cb.style.display='';cb.disabled=false;}else cb.style.display='none';
}

function updateStats(text) {
  const isCJK=LANGS[lang].isCJK, count=isCJK?text.replace(/\s/g,'').length:text.trim().split(/\s+/).filter(Boolean).length;
  const lines=text.trim().split('\n').length, rt=Math.ceil(count/(isCJK?500:200));
  document.getElementById('wordCountStat').textContent=count;
  document.getElementById('lineCountStat').textContent=lines;
  document.getElementById('readTimeStat').textContent=rt<1?'<1 min':`${rt} min`;
}

function refine(instruction) { generate(instruction); }
function setRefineEnabled(on) { ['shorterBtn','longerBtn','formalBtn','casualBtn','directBtn'].forEach(id=>{document.getElementById(id).disabled=!on;}); }
function setWriteActionEnabled(on) { ['copyBtn','clearBtn'].forEach(id=>{const e=document.getElementById(id);if(e)e.disabled=!on;}); }

async function copyOutput() {
  if (!currentOutput) return;
  await navigator.clipboard.writeText(currentOutput);
  const btn=document.getElementById('copyBtn'); btn.classList.add('copied'); btn.textContent=t('copiedText');
  setTimeout(()=>{btn.classList.remove('copied');btn.textContent=t('copyBtn');},2000);
}

async function copySubject() {
  if (!currentSubject) return;
  await navigator.clipboard.writeText(currentSubject);
  const btn=document.getElementById('copySubjectBtn'); btn.classList.add('copied'); btn.textContent=t('copiedText');
  setTimeout(()=>{btn.classList.remove('copied');btn.textContent=t('copySubjectBtn');},2000);
}

/* ══ TEXT ══ */
const VIBE_DESC = {
  funny:     'funny and witty — use humor and a funny emoji naturally',
  sweet:     'sweet, warm, heartfelt — kind and genuinely caring',
  hype:      'hype and excited — tons of energy, exclamation points, hype emojis',
  chill:     'super chill and low-key — casual, relaxed, no-pressure vibe',
  flirty:    'flirty and playful — charming with a hint of teasing',
  sorry:     'apologetic and sincere — genuinely sorry, warm and humble',
  dead:      'shocked / "I\'m literally dead 💀" — peak Gen Z energy, dying of something',
  savage:    'savage and bold — honest and direct, maybe a light roast, still friendly',
  support:   'supportive and encouraging — uplifting, warm, "I got you" energy',
  celebrate: 'celebratory and hype — party vibes, genuine excitement, make them feel celebrated 🎉',
  sarcastic: 'lightly sarcastic and witty — playful sarcasm, clearly not mean',
  dramatic:  'overdramatic and extra — exaggerate everything, theatrical, "I literally cannot"',
};

function buildTextsPrompt() {
  const ctx=document.getElementById('context').value.trim(), they=document.getElementById('theyMsg').value.trim(), you=document.getElementById('youWant').value.trim();
  if (!ctx && !they) return null;
  let p = `You are helping write a casual text message to a friend. ${t('langPrompt')}\nVibe: ${VIBE_DESC[vibe]||vibe}\n`;
  if (ctx)  p += `Situation: ${ctx}\n`;
  if (they) p += `They said: "${they}"\n`;
  if (you)  p += `What they want to say: ${you}\n`;
  p += `\nWrite exactly 3 short text message options. Each should be 1-3 sentences max, casual and natural like a real person texting. Use emojis where they fit.\nFormat exactly:\nOption 1: [message]\nOption 2: [message]\nOption 3: [message]`;
  return p;
}

async function generateTexts() {
  if (!apiKey) { openModal(); return; }
  const prompt = buildTextsPrompt();
  if (!prompt) { alert(t('alertEmpty')); return; }
  setLoading(true);
  document.getElementById('refineBar').style.display = 'none';
  document.getElementById('statsBar').style.display  = 'none';
  document.getElementById('actionBar').style.display = 'none';
  document.getElementById('outputBody').innerHTML = `<div class="texts-streaming cursor" id="textsStream"></div>`;
  try {
    const res = await fetchStream([{role:'user',content:prompt}]);
    let last='';
    await streamInto(res,(text,done)=>{
      const el=document.getElementById('textsStream'); if(el){el.textContent=text;if(done)el.classList.remove('cursor');}
      last=text; if(done) renderTextOptions(text);
    });
  } catch(e) { showError(e.message); } finally { setLoading(false); }
}

function renderTextOptions(text) {
  const opts=[], re=/Option\s*\d+:\s*(.+?)(?=Option\s*\d+:|$)/gs; let m;
  while((m=re.exec(text))!==null){const o=m[1].trim();if(o)opts.push(o);}
  const items=opts.length?opts:[text];
  const label=t('optionLabel');
  const html=items.map((o,i)=>`
    <div class="text-card">
      <div class="text-card-label">${label} ${i+1}</div>
      <div class="text-card-body" id="textOpt${i}">${escHtml(o)}</div>
      <div class="text-card-footer">
        <button class="copy-card-btn" onclick="copyCard(this,'textOpt${i}')">📋 Copy</button>
      </div>
    </div>`).join('');
  document.getElementById('outputBody').innerHTML=`<div class="text-options">${html}</div>`;
  document.getElementById('actionBar').style.display='flex';
  document.getElementById('clearBtn').disabled=false;
}

async function copyCard(btn, id) {
  const text=document.getElementById(id)?.textContent||'';
  await navigator.clipboard.writeText(text);
  btn.classList.add('copied'); btn.textContent=t('copiedText');
  setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋 Copy';},2000);
}

/* ── Shared ── */
function setLoading(on) {
  isLoading=on;
  document.getElementById('generateBtn').disabled=on;
  document.getElementById('btnContent').innerHTML=on?`<div class="spinner"></div> ${t('generatingBtn')}`:t('generateBtn');
  if(on){setRefineEnabled(false);setWriteActionEnabled(false);}
}

function showError(msg) {
  document.getElementById('outputBody').innerHTML=`<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--red);padding:30px;text-align:center"><div style="font-size:2.2rem">⚠️</div><div style="font-weight:600">${escHtml(t('errorTitle'))}</div><div style="font-size:0.83rem;color:var(--text2)">${escHtml(msg)}</div></div>`;
}

function clearOutput() {
  currentOutput=''; currentSubject='';
  const icon=mode==='text'?'📱':'✨';
  document.getElementById('outputBody').innerHTML=`<div class="empty-state"><div class="empty-icon">${icon}</div><p id="emptyStateMsg">${escHtml(t('emptyStateMsg'))}</p></div>`;
  ['refineBar','actionBar','statsBar'].forEach(id=>document.getElementById(id).style.display='none');
}

document.getElementById('context').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))handleGenerate();});

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
